services:
  - type: web
    name: forgetrack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Turso (database) ──────────────────────────────────────────────────
      - key: TURSO_DATABASE_URL
        sync: false   # fill in Render dashboard: libsql://<db-name>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false   # fill in Render dashboard: turso db tokens create <db-name>

      # ── Auth ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # generate: python -c "import secrets; print(secrets.token_hex(32))"
      - key: ADMIN_USERNAME
        sync: false   # your login username
      - key: ADMIN_PASSWORD
        sync: false   # your login password

      # ── Cloudflare R2 (file storage) ──────────────────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false   # Cloudflare dashboard > R2 > Account ID
      - key: R2_ACCESS_KEY_ID
        sync: false   # R2 API token (Access Key ID)
      - key: R2_SECRET_ACCESS_KEY
        sync: false   # R2 API token (Secret Access Key)
      - key: R2_BUCKET_NAME
        sync: false   # your R2 bucket name
      - key: R2_PUBLIC_URL
        sync: false   # public URL for bucket e.g. https://pub-xxxx.r2.dev

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGIN
        sync: false   # your Vercel URL e.g. https://forgetrack.vercel.app
